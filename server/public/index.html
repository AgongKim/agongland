<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>아공랜드 채팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #header h1 { font-size: 16px; font-weight: 700; }
    #count { font-size: 12px; color: #aaa; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      display: flex;
      align-items: baseline;
      gap: 6px;
      word-break: break-all;
      line-height: 1.5;
    }

    .nick {
      color: #ff6b6b;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nick.me { color: #66b2ff; }

    .text { flex: 1; font-size: 14px; }

    .time {
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
    }

    .system {
      justify-content: center;
      font-size: 12px;
      color: #666;
      font-style: italic;
    }

    #nick-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #2a2a2a;
      background: #141414;
      flex-shrink: 0;
    }

    #nick-bar input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
    }

    #nick-bar input:focus { border-color: #ff6b6b; }

    #nick-bar button {
      background: #333;
      border: none;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #2a2a2a;
      background: #141414;
      flex-shrink: 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    #chat-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
    }

    #chat-input:focus { border-color: #ff6b6b; }
    #chat-input:disabled { opacity: 0.4; }

    #send-btn {
      background: #ff0000;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <div id="header">
    <h1>아공랜드 채팅</h1>
    <span id="count">0명</span>
  </div>

  <div id="messages"></div>

  <div id="nick-bar">
    <input id="nick-input" type="text" placeholder="닉네임" maxlength="12" />
    <button id="nick-btn">변경</button>
  </div>

  <div id="input-bar">
    <input id="chat-input" type="text" placeholder="메시지 입력..." maxlength="300" disabled />
    <button id="send-btn" disabled>전송</button>
  </div>

  <script>
    const WS_URL = `ws://${location.host}`;
    const STORAGE_KEY = 'agongland_nickname';

    let ws = null;
    let nickname = localStorage.getItem(STORAGE_KEY) || '';
    let reconnectTimer = null;

    const messagesEl = document.getElementById('messages');
    const countEl = document.getElementById('count');
    const nickInput = document.getElementById('nick-input');
    const nickBtn = document.getElementById('nick-btn');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    nickInput.value = nickname;

    function connect() {
      clearTimeout(reconnectTimer);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', nickname }));
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'joined') {
          nickname = msg.nickname;
          localStorage.setItem(STORAGE_KEY, nickname);
          nickInput.value = nickname;
          countEl.textContent = `${msg.count}명`;
          chatInput.disabled = false;
          sendBtn.disabled = false;
          appendMessage({ type: 'system', text: '연결됐습니다.' });
        } else if (msg.type === 'system') {
          if (msg.count !== undefined) countEl.textContent = `${msg.count}명`;
          appendMessage(msg);
        } else {
          appendMessage(msg);
        }
      };

      ws.onclose = () => {
        chatInput.disabled = true;
        sendBtn.disabled = true;
        appendMessage({ type: 'system', text: '연결 끊김. 5초 후 재연결...' });
        reconnectTimer = setTimeout(connect, 5000);
      };

      ws.onerror = () => ws.close();
    }

    function appendMessage({ type, nickname: nick, text, time, isMe }) {
      const row = document.createElement('div');
      if (type === 'system') {
        row.className = 'msg system';
        row.textContent = text;
      } else {
        row.className = 'msg';
        row.innerHTML = `
          <span class="nick${isMe ? ' me' : ''}">${nick}</span>
          <span class="text">${text}</span>
          <span class="time">${time}</span>
        `;
      }
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      while (messagesEl.children.length > 200) messagesEl.removeChild(messagesEl.firstChild);
    }

    function sendChat() {
      const text = chatInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'chat', text }));
      appendMessage({
        type: 'chat',
        nickname,
        text,
        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
        isMe: true,
      });
      chatInput.value = '';
    }

    function changeNickname() {
      const name = nickInput.value.trim();
      if (!name) return;
      nickname = name;
      localStorage.setItem(STORAGE_KEY, name);
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join', nickname }));
      }
    }

    sendBtn.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) sendChat();
    });
    nickBtn.addEventListener('click', changeNickname);
    nickInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') changeNickname();
    });

    connect();
  </script>
</body>
</html>
