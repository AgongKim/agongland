<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>아공랜드 채팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #header h1 { font-size: 16px; font-weight: 700; }
    #count { font-size: 12px; color: #aaa; }

    /* 노래 목록 */
    #songs {
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #songs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #161616;
      cursor: pointer;
    }

    #songs-label { font-size: 13px; font-weight: 600; color: #aaa; }

    #songs-toggle {
      background: none;
      border: none;
      color: #666;
      font-size: 12px;
      cursor: pointer;
    }

    #songs-body { background: #111; }

    #songs-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .song-current {
      border: 1px solid #ff0000 !important;
      border-radius: 4px;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .song-num { font-size: 11px; color: #555; width: 18px; text-align: right; flex-shrink: 0; }

    .song-info { flex: 1; min-width: 0; }

    .song-title { font-size: 14px; color: #e8e8e8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

    .song-user { font-size: 11px; color: #666; }

    .song-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .song-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      font-size: 12px;
      padding: 3px 7px;
      cursor: pointer;
    }

    .song-btn:hover { background: #2a2a2a; color: #fff; }
    .song-save { color: #4caf50 !important; border-color: #4caf50 !important; }

    .song-edit-input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #ff6b6b;
      border-radius: 4px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 4px 8px;
      outline: none;
    }

    #songs-add {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
    }

    #song-add-main {
      display: flex;
      gap: 8px;
    }

    #song-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
    }

    #song-input:focus { border-color: #ff6b6b; }

    #song-add-btn {
      background: #333;
      border: none;
      border-radius: 8px;
      color: #ccc;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
    }

    #song-add-btn:hover { background: #444; color: #fff; }

    #song-singers-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #song-singers-label { font-size: 12px; color: #666; }

    #song-singers-stepper {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    #song-singers-count {
      min-width: 16px;
      text-align: center;
      font-weight: 600;
      color: #e8e8e8;
    }

    .singers-step-btn {
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      color: #aaa;
      font-size: 16px;
      width: 28px;
      height: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .singers-step-btn:hover:not(:disabled) { background: #333; color: #fff; }
    .singers-step-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .song-title-joining { color: #66b2ff; }

    .song-join-btn {
      background: none;
      border: 1px solid #ff6b6b;
      border-radius: 6px;
      color: #ff6b6b;
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
    }

    .song-join-btn:hover { background: rgba(255,107,107,0.15); }

    .song-joined-mark {
      font-size: 13px;
      color: #4caf50;
    }

    /* 메시지 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .msg { display: flex; align-items: baseline; gap: 6px; word-break: break-all; line-height: 1.5; }
    .nick { color: #ff6b6b; font-weight: 700; font-size: 13px; flex-shrink: 0; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nick.me { color: #66b2ff; }
    .text { flex: 1; font-size: 14px; }
    .time { font-size: 10px; color: #555; flex-shrink: 0; }
    .system { justify-content: center; font-size: 12px; color: #666; font-style: italic; }

    #nick-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #2a2a2a;
      background: #141414;
      flex-shrink: 0;
    }

    #nick-bar input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
    }

    #nick-bar input:focus { border-color: #ff6b6b; }

    #nick-bar button {
      background: #333;
      border: none;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #2a2a2a;
      background: #141414;
      flex-shrink: 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    #chat-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
    }

    #chat-input:focus { border-color: #ff6b6b; }
    #chat-input:disabled { opacity: 0.4; }

    #send-btn {
      background: #ff0000;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: 0.4; }

    #nick-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #nick-overlay-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 32px 28px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #nick-overlay-box h2 { font-size: 18px; text-align: center; }
    #nick-overlay-box p { font-size: 13px; color: #aaa; text-align: center; }

    #nick-overlay-input {
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      text-align: center;
    }

    #nick-overlay-input:focus { border-color: #ff6b6b; }

    #nick-overlay-btn {
      background: #ff0000;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
    }

    #nick-overlay-btn:hover { background: #cc0000; }
  </style>
</head>
<body>
  <div id="nick-overlay">
    <div id="nick-overlay-box">
      <h2>아공랜드 채팅</h2>
      <p>사용할 닉네임을 입력해주세요</p>
      <input id="nick-overlay-input" type="text" placeholder="닉네임 (최대 12자)" maxlength="12" />
      <button id="nick-overlay-btn">시작하기</button>
    </div>
  </div>

  <div id="header">
    <h1>아공랜드 채팅</h1>
    <span id="count">0명</span>
  </div>

  <div id="songs">
    <div id="songs-header">
      <span id="songs-label">노래 목록 (0)</span>
      <button id="songs-toggle">▲</button>
    </div>
    <div id="songs-body">
      <div id="songs-list"></div>
      <div id="songs-add">
        <div id="song-add-main">
          <input id="song-input" type="text" placeholder="노래 제목 입력..." maxlength="100" />
          <button id="song-add-btn">추가</button>
        </div>
        <div id="song-singers-row">
          <span id="song-singers-label">같이 부르기</span>
          <div id="song-singers-stepper">
            <button class="singers-step-btn" id="song-singers-minus" disabled>−</button>
            <span id="song-singers-count">1</span>명
            <button class="singers-step-btn" id="song-singers-plus">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="nick-bar">
    <input id="nick-input" type="text" placeholder="닉네임" maxlength="12" />
    <button id="nick-btn">변경</button>
  </div>

  <div id="input-bar">
    <input id="chat-input" type="text" placeholder="메시지 입력..." maxlength="300" disabled />
    <button id="send-btn" disabled>전송</button>
  </div>

  <script>
    const WS_URL = `ws://${location.host}`;
    const STORAGE_KEY = 'agongland_nickname';

    let ws = null;
    let nickname = localStorage.getItem(STORAGE_KEY) || '';
    let reconnectTimer = null;

    const overlay = document.getElementById('nick-overlay');
    const overlayInput = document.getElementById('nick-overlay-input');
    const overlayBtn = document.getElementById('nick-overlay-btn');

    function startWithNickname() {
      const name = overlayInput.value.trim();
      if (!name) { overlayInput.focus(); return; }
      nickname = name;
      localStorage.setItem(STORAGE_KEY, name);
      overlay.style.display = 'none';
      document.getElementById('nick-input').value = name;
      connect();
    }

    if (nickname) {
      overlay.style.display = 'none';
    } else {
      overlayInput.focus();
    }

    overlayBtn.addEventListener('click', startWithNickname);
    overlayInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) startWithNickname();
    });
    let songsCollapsed = false;
    let singerCount = 1;

    const messagesEl = document.getElementById('messages');
    const countEl = document.getElementById('count');
    const nickInput = document.getElementById('nick-input');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const songsBody = document.getElementById('songs-body');
    const songsToggle = document.getElementById('songs-toggle');
    const songsList = document.getElementById('songs-list');
    const songsLabel = document.getElementById('songs-label');
    const songInput = document.getElementById('song-input');

    function updateSingerCount() {
      document.getElementById('song-singers-count').textContent = singerCount;
      document.getElementById('song-singers-minus').disabled = singerCount <= 1;
      document.getElementById('song-singers-plus').disabled = singerCount >= 8;
    }

    document.getElementById('song-singers-minus').addEventListener('click', () => {
      if (singerCount > 1) { singerCount--; updateSingerCount(); }
    });
    document.getElementById('song-singers-plus').addEventListener('click', () => {
      if (singerCount < 8) { singerCount++; updateSingerCount(); }
    });

    nickInput.value = nickname;

    document.getElementById('songs-header').addEventListener('click', () => {
      songsCollapsed = !songsCollapsed;
      songsBody.style.display = songsCollapsed ? 'none' : 'block';
      songsToggle.textContent = songsCollapsed ? '▼' : '▲';
    });

    document.getElementById('song-add-btn').addEventListener('click', addSong);
    songInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) addSong();
    });

    function addSong() {
      const title = songInput.value.trim();
      if (!title || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'song:add', title, maxParticipants: singerCount }));
      songInput.value = '';
      singerCount = 1;
      updateSingerCount();
    }

    function renderSongs(songs) {
      songsLabel.textContent = `노래 목록 (${songs.length})`;
      songsList.innerHTML = '';
      songs.forEach((song, idx) => {
        const participants = song.participants && song.participants.length > 0 ? song.participants : [song.nickname];
        const maxP = song.maxParticipants || 1;
        const isFull = participants.length >= maxP;
        const alreadyJoined = participants.includes(nickname);
        const showJoin = maxP > 1 && !isFull && !alreadyJoined;
        const countLabel = maxP > 1 ? ` · ${participants.length}/${maxP}명` : '';
        const participantsText = participants.map(p => `@${p}`).join(', ');

        const div = document.createElement('div');
        div.className = 'song-item' + (idx === 0 ? ' song-current' : '');
        div.dataset.id = song.id;
        div.innerHTML = `
          <span class="song-num">${idx + 1}</span>
          <div class="song-info">
            <span class="song-title${!isFull && maxP > 1 ? ' song-title-joining' : ''}">${song.title}</span>
            <span class="song-user">${participantsText}${countLabel}</span>
          </div>
          <div class="song-actions">
            ${showJoin ? `<button class="song-join-btn" data-action="join">참여</button>` : ''}
            ${alreadyJoined && isFull && maxP > 1 ? `<span class="song-joined-mark">✓</span>` : ''}
            <button class="song-btn" data-action="up">▲</button>
            <button class="song-btn" data-action="down">▼</button>
            <button class="song-btn" data-action="edit">✎</button>
            <button class="song-btn" data-action="del">✕</button>
          </div>
        `;
        div.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            handleSongAction(song.id, btn.dataset.action, song.title, div);
          });
        });
        songsList.appendChild(div);
      });
    }

    function handleSongAction(id, action, currentTitle, itemEl) {
      if (action === 'join') ws.send(JSON.stringify({ type: 'song:join', id }));
      if (action === 'up') ws.send(JSON.stringify({ type: 'song:move', id, direction: 'up' }));
      if (action === 'down') ws.send(JSON.stringify({ type: 'song:move', id, direction: 'down' }));
      if (action === 'del') ws.send(JSON.stringify({ type: 'song:delete', id }));
      if (action === 'edit') {
        const info = itemEl.querySelector('.song-info');
        const actions = itemEl.querySelector('.song-actions');
        info.innerHTML = `<input class="song-edit-input" value="${currentTitle}" maxlength="100" />`;
        actions.innerHTML = `
          <button class="song-btn song-save">저장</button>
          <button class="song-btn">취소</button>
        `;
        const input = info.querySelector('input');
        input.focus(); input.select();
        const save = () => {
          const title = input.value.trim();
          if (title) ws.send(JSON.stringify({ type: 'song:edit', id, title }));
        };
        actions.querySelector('.song-save').addEventListener('click', save);
        actions.querySelectorAll('.song-btn')[1].addEventListener('click', () => {
          ws.send(JSON.stringify({ type: 'song:add', title: '' })); // 서버에서 재전송 트리거 없이 직접 재요청
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.isComposing) save();
        });
      }
    }

    function connect() {
      clearTimeout(reconnectTimer);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => ws.send(JSON.stringify({ type: 'join', nickname }));

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'joined') {
          nickname = msg.nickname;
          localStorage.setItem(STORAGE_KEY, nickname);
          nickInput.value = nickname;
          countEl.textContent = `${msg.count}명`;
          chatInput.disabled = false;
          sendBtn.disabled = false;
        } else if (msg.type === 'song:list') {
          renderSongs(msg.songs);
        } else if (msg.type === 'system') {
          if (msg.count !== undefined) countEl.textContent = `${msg.count}명`;
          appendMessage(msg);
        } else {
          appendMessage(msg);
        }
      };

      ws.onclose = () => {
        chatInput.disabled = true;
        sendBtn.disabled = true;
        reconnectTimer = setTimeout(connect, 5000);
      };

      ws.onerror = () => ws.close();
    }

    function appendMessage({ type, nickname: nick, text, time, isMe }) {
      const row = document.createElement('div');
      if (type === 'system') {
        row.className = 'msg system';
        row.textContent = text;
      } else {
        row.className = 'msg';
        row.innerHTML = `
          <span class="nick${isMe ? ' me' : ''}">${nick}</span>
          <span class="text">${text}</span>
          <span class="time">${time}</span>
        `;
      }
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      while (messagesEl.children.length > 200) messagesEl.removeChild(messagesEl.firstChild);
    }

    function sendChat() {
      const text = chatInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'chat', text }));
      appendMessage({
        type: 'chat', nickname, text,
        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
        isMe: true,
      });
      chatInput.value = '';
    }

    function changeNickname() {
      const name = nickInput.value.trim();
      if (!name) return;
      nickname = name;
      localStorage.setItem(STORAGE_KEY, name);
      if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'join', nickname }));
    }

    sendBtn.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) sendChat(); });
    document.getElementById('nick-btn').addEventListener('click', changeNickname);
    nickInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') changeNickname(); });

    if (nickname) connect();
  </script>
</body>
</html>
